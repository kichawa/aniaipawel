<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ania i Paweł</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --text: #4a3f35;
  --accent: #b08a6a;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  color: var(--text);
}

/* TŁO ZE ZDJĘCIEM */
.hero {
  position: relative;
  min-height: 100svh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: url('slub.jpg') center/cover no-repeat;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(4px);
}

/* KARTA */
.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 700px;
  background: rgba(255,255,255,0.92);
  border-radius: 22px;
  padding: clamp(28px, 5vw, 50px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  text-align: center;
  animation: fadeIn 1.2s ease;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 6vw, 46px);
  margin-bottom: 10px;
}

.status {
  font-size: clamp(22px, 5vw, 30px);
  font-weight: 600;
  margin: 20px 0;
  color: var(--accent);
}

/* LICZNIK */
.counter {
  font-size: clamp(28px, 6vw, 40px);
  font-weight: 700;
  margin: 20px 0;
}

.counter span {
  display: block;
  font-size: 16px;
  font-weight: 400;
  opacity: 0.7;
}

/* CYTAT */
.quote {
  margin: 30px 0;
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 4vw, 26px);
  font-style: italic;
  line-height: 1.4;
}

.quote small {
  display: block;
  margin-top: 10px;
  font-size: 14px;
  font-style: normal;
  opacity: 0.7;
}

.footer {
  margin-top: 36px;
  font-size: 14px;
  opacity: 0.8;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>
<section class="hero">
  <div class="card">
    <h1>Ania & Paweł</h1>

    <div class="status">Jesteśmy już małżeństwem 🤍</div>

    <div class="counter" id="daysCounter">
      0
      <span>dni razem 🙌🎉</span>
    </div>

    <div class="quote">
    </div>

    <div class="footer">
      Dziękujemy, że byliście z nami 💍
    </div>
  </div>
</section>

<script>
// 🔧 USTAW DATĘ ŚLUBU (YYYY, MIESIĄC-1, DZIEŃ)
const weddingDate = new Date(2026, 3, 25); // np. 30 kwietnia 2026

function updateCounter() {
  const today = new Date();
  const diffTime = today - weddingDate;
  const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  document.getElementById("daysCounter").firstChild.nodeValue = days;
}

updateCounter();
</script>

</body>
</html>
