<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ania i Paweł</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg1: #f8f5f2;
  --bg2: #efe9e4;
  --text: #4a3f35;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, var(--bg1), var(--bg2));
  color: var(--text);
}

.hero {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  min-height: 100svh;
}

.card {
  width: 100%;
  max-width: 700px;
  background: rgba(255,255,255,0.95);
  border-radius: 22px;
  padding: clamp(28px, 5vw, 50px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  text-align: center;
  animation: fadeIn 1.2s ease;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 6vw, 46px);
  margin-bottom: 10px;
}

.big-day {
  font-size: clamp(22px, 5vw, 30px);
  font-weight: 600;
  margin: 20px 0 30px;
  color: #b08a6a;
}

.section {
  margin-top: 28px;
}

.section h2 {
  font-size: 18px;
  margin-bottom: 8px;
}

.address {
  font-size: 15px;
  margin-bottom: 12px;
}

.btn {
  display: inline-block;
  padding: 10px 16px;
  border-radius: 12px;
  background: #4a3f35;
  color: white;
  text-decoration: none;
  font-size: 14px;
  transition: 0.2s;
}

.btn:hover {
  background: #2f2620;
}

.footer {
  margin-top: 36px;
  font-size: 14px;
  opacity: 0.8;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>
<section class="hero">
  <div class="card">
    <h1>Ania & Paweł</h1>

    <div class="big-day">TO JUŻ DZIŚ!!! 🎉</div>

    <!-- KOŚCIÓŁ -->
    <div class="section">
      <h2>Ślub 15:00</h2>
      <div class="address">
        Parafia Rzymsko - Katolicka<br>
        p.w. Św. Zygmunta<br>
        ul. Zakościelna 13<br>
        26-500 Szydłowiec
      </div>
      <a class="btn" target="_blank"
         href="https://maps.app.goo.gl/7D8vcVCFigAiLNEE8">
        📍 Otwórz w Google Maps
      </a>
    </div>

    <!-- WESELE -->
    <div class="section">
      <h2>Wesele</h2>
      <div class="address">
        Sala Weselna "VILLA RENARD"<br>
        Trablice 78<br>
        26-600 Radom
      </div>
      <a class="btn" target="_blank"
         href="https://maps.app.goo.gl/ULurwseitEqZtVCg9">
        📍 Nawiguj do sali
      </a>
    </div>

    <div class="footer">
      Do zobaczenia 🤍
    </div>
  </div>
</section>
</body>
</html>
